name: 每日自动任务

on:
  schedule:
    - cron: "0 0 * * *"    # 北京时间 08:00
    - cron: "0 12 * * *"   # 北京时间 20:00
  workflow_dispatch:

jobs:
  daily_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run main program
        run: python main.py